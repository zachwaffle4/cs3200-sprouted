name: project-app-team-repo

services:
  app:
    build: ./app
    container_name: web-app
    hostname: web-app
    volumes: ["./app/src:/appcode"]
    environment:
      - WATCHPACK_POLLING=true
    ports:
      - 8501:8501

  api:
    build: ./api
    container_name: web-api
    hostname: web-api
    env_file:
      - ./api/.env
    volumes:
      - "./api:/apicode"
      - "./database-files:/database-files"
    environment:
      - WATCHPACK_POLLING=true
    ports:
      - 4000:4000
    depends_on:
      - db
    command: |
      sh -c "
      pip install faker &&
      until python -c 'import os, mysql.connector; mysql.connector.connect(host=os.environ.get(\"DB_HOST\",\"db\"), user=os.environ.get(\"DB_USER\",\"root\"), password=os.environ.get(\"MYSQL_ROOT_PASSWORD\",\"\"), database=os.environ.get(\"DB_NAME\",\"sprouted\")).close()' 2>/dev/null; do echo 'waiting for mysql...'; sleep 2; done &&
      python /database-files/seed.py &&
      python -u backend_app.py
      "

  db:
    env_file:
      - ./api/.env
    image: mysql:9
    container_name: mysql_db
    hostname: db
    volumes:
      - "./database-files:/docker-entrypoint-initdb.d/:ro"
      - "mysql_data:/var/lib/mysql"
    ports:
      - 3200:3306

volumes:
  mysql_data:
